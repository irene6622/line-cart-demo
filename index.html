<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>舒潔品牌優惠試算工具</title>
  <style>
    :root { --primary: #27ae60; --blue: #2980b9; --bg: #f4f7f6; --orange: #e67e22; --red: #c0392b; }
    body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 20px; }
    .container { max-width: 950px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: var(--primary); font-size: 24px; margin-bottom: 15px; }
    
    .promo-banner { background: #e8f5e9; border: 1px solid #c8e6c9; padding: 15px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; color: #2e7d32; line-height: 1.6; }
    
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    th { background: var(--primary); color: white; padding: 12px; text-align: left; position: sticky; top: 0; z-index: 10; }
    td { padding: 15px 10px; border-bottom: 1px solid #eee; font-size: 15px; vertical-align: middle; }
    
    .spec-text { font-size: 13px; color: #7f8c8d; display: block; margin-top: 2px; }
    .price-info { font-size: 20px; font-weight: bold; color: #2c3e50; }
    .subtotal-display { font-size: 22px; font-weight: 800; color: var(--blue); }
    
    input[type="number"] { width: 80px; padding: 10px; border: 2px solid #ddd; border-radius: 6px; text-align: center; font-size: 22px; font-weight: bold; }
    input[type="number"]:focus { border-color: var(--primary); outline: none; background: #fff; }
    
    .tag { font-size: 12px; padding: 3px 6px; border-radius: 4px; margin-left: 5px; color: white; font-weight: bold; display: inline-block; }
    .tag-target { background: var(--orange); }

    .summary { background: #2c3e50; color: white; padding: 25px; border-radius: 12px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; margin-top: 20px; }
    .summary-left .item { margin-bottom: 12px; font-size: 17px; display: flex; justify-content: space-between; border-bottom: 1px solid #34495e; padding-bottom: 5px; }
    .summary-right { border-left: 1px solid #34495e; padding-left: 25px; display: flex; flex-direction: column; justify-content: center; }
    .final-val { color: #f1c40f; font-weight: bold; font-size: 40px; }
    .gift-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; margin-top: 10px; color: #2ecc71; border: 1px dashed #2ecc71; font-size: 16px; line-height: 1.4; }
  </style>
</head>
<body>

<div class="container">
  <h1>🧻 舒潔全系列優惠試算表</h1>
  
  <div class="promo-banner">
    🔥 <strong>滿額現折：</strong>單筆每滿 <strong>$888 現折 $150</strong> (可累折，滿$1776折$300，以此類推)<br>
    🎁 <strong>指定品抽件贈：</strong>任選指定 5 支品項，買 <strong>1 件送 2 包</strong> / 買 <strong>3 件送 8 包(1串)</strong> (擇優不重疊贈送)<br>
    ※ 贈品：雲絨舒適抽取衛生紙_玩具總動員90抽/包
  </div>

  <table>
    <thead>
      <tr>
        <th style="width: 50%;">商品名稱 / 規格</th>
        <th style="width: 20%;">單價</th>
        <th style="width: 15%;">數量</th>
        <th style="width: 15%;">小計</th>
      </tr>
    </thead>
    <tbody id="cart-body"></tbody>
  </table>

  <div class="summary">
    <div class="summary-left">
      <div class="item">原始總額: <span>$ <span id="raw-total">0</span></span></div>
      <div class="item" style="color: #ff7675; font-weight: bold;">滿額折抵 (每滿888折150): <span>-$ <span id="brand-discount">0</span></span></div>
    </div>
    <div class="summary-right">
      <div style="font-size: 18px;">折扣後應付總額：</div>
      <div class="final-val">$ <span id="final-total">0</span> 元</div>
      <div class="gift-box">
        <strong>🎁 符合贈品明細：</strong><br>
        <span id="gift-text">尚未達標</span>
      </div>
      <div style="font-size: 14px; margin-top: 10px; color: #bdc3c7;">指定品項累計：<span id="count-text" style="color:#fff; font-weight:bold;">0</span> 件</div>
    </div>
  </div>
</div>

<script>
  // 錄入全新舒潔 5 支主力商品
  const products = [
    { name: "舒潔 棉柔厚韌抽取衛生紙", spec: "90抽＊24包", price: 389 },
    { name: "舒潔 極絨厚４層抽取衛生紙", spec: "80抽＊20包", price: 349 },
    { name: "舒潔 棉柔舒適迪士尼抽取衛生紙", spec: "100抽＊24包", price: 315 },
    { name: "舒潔 蘆薈抽取衛生紙", spec: "100抽＊30包", price: 399 },
    { name: "舒潔 濕式衛生紙", spec: "40抽＊7包 贈 10抽＊2包", price: 345 }
  ];

  const cartBody = document.getElementById('cart-body');

  function init() {
    products.forEach((p, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>
          <strong>${p.name}</strong>
          <span class="spec-text">${p.spec}</span>
          <span class="tag tag-target">指定贈品品項</span>
        </td>
        <td><span class="price-info">$${p.price}</span></td>
        <td><input type="number" min="0" value="0" oninput="calculate()" data-index="${i}"></td>
        <td><span class="subtotal-display">0</span></td>
      `;
      cartBody.appendChild(tr);
    });
  }

  function calculate() {
    let rawTotal = 0;
    let totalTargetQty = 0; // 統計 5 支指定品項的總件數

    const inputs = cartBody.querySelectorAll('input');
    inputs.forEach((input, i) => {
      const qty = parseInt(input.value) || 0;
      const p = products[i];
      const sub = qty * p.price;
      
      input.closest('tr').querySelector('.subtotal-display').textContent = sub;

      if (qty > 0) {
        rawTotal += sub;
        totalTargetQty += qty; // 5 支皆為指定品
      }
    });

    // 1. 舒潔全系列滿額折抵 (每滿 888 折 150)
    const brandDiscount = Math.floor(rawTotal / 888) * 150;

    // 2. 5支指定品項贈包邏輯 (3件送8包(1串) / 1件送2包，不重疊)
    let giftText = "尚未達標";
    if (totalTargetQty >= 3) {
      giftText = "雲絨舒適抽取衛生紙_玩具總動員 (8包/1串) × 1 串";
    } else if (totalTargetQty >= 1) {
      giftText = "雲絨舒適抽取衛生紙_玩具總動員 (90抽/包) × 2 包";
    }

    // 計算最終金額
    const finalVal = rawTotal - brandDiscount;

    // 更新介面數值
    document.getElementById('raw-total').textContent = rawTotal;
    document.getElementById('brand-discount').textContent = brandDiscount;
    document.getElementById('gift-text').textContent = giftText;
    document.getElementById('count-text').textContent = totalTargetQty;
    document.getElementById('final-total').textContent = finalVal > 0 ? finalVal : 0;
  }

  init();
</script>
</body>
</html>
