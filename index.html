<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>靠得住/自由適試算工具</title>
  <style>
    :root { --primary: #e84393; --blue: #0984e3; --bg: #f9f9fb; }
    body { font-family: "PingFang TC", sans-serif; background: var(--bg); margin: 20px; }
    .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: var(--primary); }
    .promo-banner { background: #fff9db; border: 1px solid #ffe066; padding: 15px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; line-height: 1.6; color: #856404; }
    
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    th { background: var(--primary); color: white; padding: 12px; text-align: left; position: sticky; top: 0; }
    td { padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 15px; }
    
    .price-display { font-size: 17px; font-weight: bold; }
    .subtotal-display { font-size: 20px; font-weight: 800; color: var(--blue); }
    input[type="number"] { width: 65px; padding: 8px; border: 2px solid #ddd; border-radius: 6px; text-align: center; font-size: 16px; }
    
    .tag { font-size: 11px; padding: 2px 5px; border-radius: 4px; margin-left: 5px; color: white; font-weight: bold; }
    .tag-free { background: #6c5ce7; } /* 自由適 */
    .tag-pad { background: #fab1a0; } /* 護墊/褲型換算 */

    .summary { background: #2d3436; color: white; padding: 25px; border-radius: 12px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
    .summary-left .item { margin-bottom: 10px; font-size: 16px; display: flex; justify-content: space-between; }
    .summary-right { border-left: 1px solid #555; padding-left: 25px; display: flex; flex-direction: column; justify-content: center; }
    .final-val { color: #f1c40f; font-weight: bold; font-size: 32px; }
    .highlight-red { color: #ff7675; font-weight: bold; }
    .gift-box { background: rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; margin-top: 10px; color: #55efc4; border: 1px dashed #55efc4; }
  </style>
</head>
<body>

<div class="container">
  <h1>靠得住 / 自由適 試算購物車</h1>
  
  <div class="promo-banner">
    ✨ <strong>自由適優惠：</strong>任 2 件折 $40 且 滿 $599 再折 $70 (均可累折)<br>
    💖 <strong>靠得住優惠：</strong>全系列滿 $349 折 $30 | 衛生棉滿 $259 折 $30<br>
    🎁 <strong>贈品規則：</strong>滿 2 件送茶樹體驗包(3包)；滿 6 件改送可麗舒(10包/串) | <small>護墊/褲型 2 包算 1 件</small>
  </div>

  <table>
    <thead>
      <tr>
        <th style="width: 50%;">品項名稱</th>
        <th style="width: 20%;">單價</th>
        <th style="width: 15%;">數量</th>
        <th style="width: 15%;">小計</th>
      </tr>
    </thead>
    <tbody id="cart-body"></tbody>
  </table>

  <div class="summary">
    <div class="summary-left">
      <div class="item">原始總額: <span id="raw-total">0</span></div>
      <div class="item">自由適 2件折40: <span id="free-qty-discount" class="highlight-red">0</span></div>
      <div class="item">自由適 599折70: <span id="free-money-discount" class="highlight-red">0</span></div>
      <div class="item">靠得住 349折30: <span id="brand-discount" class="highlight-red">0</span></div>
      <div class="item">衛生棉 259折30: <span id="pad-discount" class="highlight-red">0</span></div>
    </div>
    <div class="summary-right">
      <div>應付總額：</div>
      <div id="final-total" class="final-val">0 元</div>
      <div class="gift-box">🎁 贈品：<span id="gift-text">無</span></div>
      <div style="font-size: 13px; margin-top: 8px; color: #bdc3c7;">計算件數：<span id="count-text" style="color:#fff; font-weight:bold;">0</span> 件</div>
    </div>
  </div>
</div>

<script>
  const products = [
    { name: "草本抑菌日用23cm 13+2片*3", price: 159, isPad: true },
    { name: "草本抑菌夜用28cm 11+2片*3", price: 159, isPad: true },
    { name: "草本抑菌大流量35cm 8片*3", price: 159, isPad: true },
    { name: "茶樹舒涼日用23cm 11+2片*3", price: 159, isPad: true },
    { name: "茶樹舒涼夜用28cm 9+2片*3", price: 159, isPad: true },
    { name: "茶樹舒涼大流量35cm 7片*3", price: 159, isPad: true },
    { name: "完美封漏28cm 13片*4", price: 149, isPad: true },
    { name: "完美封漏35cm 9片*4", price: 149, isPad: true },
    { name: "完美封漏41cm 7片*4", price: 149, isPad: true },
    { name: "晚安好眠褲 M/L/XL 4片*2", price: 158, isPad: true, isHalf: true }, 
    { name: "茶樹舒涼褲型衛生棉 M/L 4片*2", price: 158, isPad: true, isHalf: true },
    { name: "茶樹舒涼護墊14.5cm 30片*3", price: 109, isPad: false, isHalf: true },
    { name: "草本抑菌護墊14.5cm 30片*3", price: 109, isPad: false, isHalf: true },
    { name: "吸得住超薄護墊14.5cm 40片*3", price: 109, isPad: false, isHalf: true },
    { name: "柔棉乾爽安睡褲 M-L 20片", price: 349, isKotex: true },
    { name: "漏電斷路器專用(成褲) L 16片", price: 349, isKotex: true },
    { name: "自由適 抑菌成人尿褲 M-L", price: 199, isFree: true },
    { name: "自由適 抑菌成人尿褲 L-XL", price: 199, isFree: true },
    { name: "金貝貝 頂級柔棉 M/L/XL", price: 299, isKotex: true }
  ];

  const cartBody = document.getElementById('cart-body');

  function init() {
    products.forEach((p, i) => {
      let tag = p.isFree ? '<span class="tag tag-free">自由適優惠</span>' : '';
      if(p.isHalf) tag += '<span class="tag tag-pad">2換1件</span>';
      
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${p.name}${tag}</td>
        <td><span class="price-display">${p.price}</span></td>
        <td><input type="number" min="0" value="0" oninput="calculate()" data-index="${i}"></td>
        <td><span class="subtotal-display">0</span></td>
      `;
      cartBody.appendChild(tr);
    });
  }

  function calculate() {
    let rawTotal = 0;
    let padMoney = 0;   // 衛生棉類(含褲型)總額
    let kotexMoney = 0; // 靠得住全系列總額
    let freeMoney = 0;  // 自由適總額
    let freeQty = 0;    // 自由適總數量
    
    let fullItemQty = 0; // 算1件的數量
    let halfItemQty = 0; // 算0.5件的數量

    const inputs = cartBody.querySelectorAll('input');
    inputs.forEach((input, i) => {
      const qty = parseInt(input.value) || 0;
      const p = products[i];
      const sub = qty * p.price;
      input.closest('tr').querySelector('.subtotal-display').textContent = sub;

      if (qty > 0) {
        rawTotal += sub;
        
        // 分類累計
        if (p.isPad) padMoney += sub;
        if (!p.isFree) kotexMoney += sub; // 非自由適即為靠得住
        if (p.isFree) {
          freeMoney += sub;
          freeQty += qty;
        }

        // 件數計算
        if (p.isHalf) halfItemQty += qty;
        else fullItemQty += qty;
      }
    });

    const totalItems = fullItemQty + Math.floor(halfItemQty / 2);

    // 折扣計算
    const discFreeQty = Math.floor(freeQty / 2) * 40;     // 自由適2件折40
    const discFreeMoney = Math.floor(freeMoney / 599) * 70; // 自由適滿599折70
    const discBrand = Math.floor(kotexMoney / 349) * 30; // 靠得住滿349折30
    const discPad = Math.floor(padMoney / 259) * 30;     // 衛生棉滿259折30

    // 贈品
    let gift = "無";
    if (totalItems >= 6) gift = "可麗舒衛生紙100抽x10包/串";
    else if (totalItems >= 2) gift = "茶樹舒涼棉體驗包 x 3 包";

    // 更新顯示
    document.getElementById('raw-total').textContent = rawTotal;
    document.getElementById('free-qty-discount').textContent = `-${discFreeQty}`;
    document.getElementById('free-money-discount').textContent = `-${discFreeMoney}`;
    document.getElementById('brand-discount').textContent = `-${discBrand}`;
    document.getElementById('pad-discount').textContent = `-${discPad}`;
    document.getElementById('gift-text').textContent = gift;
    document.getElementById('count-text').textContent = totalItems;
    
    const finalVal = rawTotal - discFreeQty - discFreeMoney - discBrand - discPad;
    document.getElementById('final-total').textContent = (finalVal > 0 ? finalVal : 0) + " 元";
  }

  init();
</script>
</body>
</html>
