<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>衛生紙試算購物車</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 20px;
      background: #f7f7f7;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      margin-bottom: 15px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      font-size: 14px;
    }
    th {
      background: #f0f0f0;
      text-align: left;
    }
    input[type="number"] {
      width: 60px;
    }
    .summary {
      margin-top: 15px;
      padding: 10px;
      background: #fff;
      border: 1px solid #ddd;
    }
    .summary div {
      margin: 4px 0;
      font-size: 15px;
    }
    .highlight {
      color: #c0392b;
      font-weight: bold;
    }
    .note {
      font-size: 13px;
      color: #555;
      margin-top: 6px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>衛生紙試算購物車（滿 799 折 120，可累計）</h1>
  <p>輸入各品項的「串數」，系統會自動計算總金額與折扣，2 入折價已套用。</p>

  <table>
    <thead>
      <tr>
        <th>商品名稱</th>
        <th>規格／描述</th>
        <th>計價說明</th>
        <th>輸入數量（串）</th>
        <th>小計</th>
      </tr>
    </thead>
    <tbody id="cart-body">
      <!-- 商品列由 JavaScript 產生 -->
    </tbody>
  </table>

  <div class="summary">
    <div>原價總額：<span id="total">0</span> 元</div>
    <div>折扣金額（每滿 799 折 120，可累計）：<span id="discount" class="highlight">0</span> 元</div>
    <div>折扣後金額：<span id="final-total" class="highlight">0</span> 元</div>
    <div class="note">
      備註：<br>
      1. 好韌真 3 層／唯潔雅 潔淨柔感：依 A 方案計算，每 2 串一組用 2 入價，剩餘以單串價計算。<br>
      2. 買 1 串時即為單串價；買 3 串 = 一組 2 入價 +
