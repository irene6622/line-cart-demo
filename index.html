<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>衛生紙試算購物車</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 20px;
      background: #f7f7f7;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      margin-bottom: 15px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      font-size: 14px;
    }
    th {
      background: #f0f0f0;
      text-align: left;
    }
    input[type="number"] {
      width: 60px;
    }
    .summary {
      margin-top: 15px;
      padding: 10px;
      background: #fff;
      border: 1px solid #ddd;
    }
    .summary div {
      margin: 4px 0;
      font-size: 15px;
    }
    .highlight {
      color: #c0392b;
      font-weight: bold;
    }
    .note {
      font-size: 13px;
      color: #555;
      margin-top: 6px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>衛生紙試算購物車（滿 799 折 120，可累計）</h1>
  <p>輸入各品項的「串數」，系統會自動計算總金額與折扣，2 入折價已套用。</p>

  <table>
    <thead>
      <tr>
        <th>商品名稱</th>
        <th>規格／描述</th>
        <th>計價說明</th>
        <th>輸入數量（串）</th>
        <th>小計</th>
      </tr>
    </thead>
    <tbody id="cart-body">
      <!-- 商品列由 JavaScript 產生 -->
    </tbody>
  </table>

  <div class="summary">
    <div>原價總額：<span id="total">0</span> 元</div>
    <div>折扣金額（每滿 799 折 120，可累計）：<span id="discount" class="highlight">0</span> 元</div>
    <div>折扣後金額：<span id="final-total" class="highlight">0</span> 元</div>
    <div id="gift-info" class="note"></div>
    <div class="note">
      備註：<br>
      1. 買 1 串即為單串價；買 3 串 = 一組 2 入價 + 1 串單價，以此類推。
    </div>
  </div>

  <script>
    // 商品資料（只保留六個品項）
    const products = [
      {
        key: "paseo3",
        name: "PASEO 3層柔韌舒適抽取式衛生紙",
        desc: "100 抽＊24 包",
        pricingNote: "單串 349 元；買 2 串可得 PASEO 濕式 20 抽×4 包／組 1 組",
        priceSingle: 349
      },
      {
        key: "bjSoft",
        name: "倍潔雅 柔軟舒適抽取式衛生紙",
        desc: "100 抽＊24 包",
        pricingNote: "單串 219 元",
        priceSingle: 219
      },
      {
        key: "consofy3",
        name: "CONSOFY 3層抽取衛生紙",
        desc: "120 抽＊24 包",
        pricingNote: "單串 365 元",
        priceSingle: 365
      },
      {
        key: "goodPro",
        name: "倍潔雅 好韌真 Pro 3層抽取式衛生紙",
        desc: "100 抽＊24 包",
        pricingNote: "單串 309 元（買 1 送 2 包、買 2 送 5 包）",
        priceSingle: 309
      },
      {
        key: "good3",
        name: "倍潔雅 好韌真 3層抽取衛生紙",
        desc: "100 抽＊24 包",
        pricingNote: "單串 309 元，2 串 578 元（A 方案：每 2 串一組 578 元，餘數以 309 元計）",
        priceSingle: 309,
        pairPrice: 578
      },
      {
        key: "weeClean",
        name: "唯潔雅 潔淨柔感抽取式衛生紙",
        desc: "100 抽＊24 包",
        pricingNote: "單串 219 元，2 串 415 元（A 方案：每 2 串一組 415 元，餘數以 219 元計）",
        priceSingle: 219,
        pairPrice: 415
      }
    ];

    // 滿額折扣設定
    const DISCOUNT_THRESHOLD = 799; // 每滿 799
    const DISCOUNT_AMOUNT = 120;    // 折 120

    const cartBody = document.getElementById("cart-body");
    const totalSpan = document.getElementById("total");
    const discountSpan = document.getElementById("discount");
    const finalTotalSpan = document.getElementById("final-total");
    const giftInfoDiv = document.getElementById("gift-info");

    // 建立商品列表
    products.forEach((p, index) => {
      const tr = document.createElement("tr");

      const nameTd = document.createElement("td");
      nameTd.textContent = p.name;
      tr.appendChild(nameTd);

      const descTd = document.createElement("td");
      descTd.textContent = p.desc;
      tr.appendChild(descTd);

      const pricingTd = document.createElement("td");
      pricingTd.textContent = p.pricingNote;
      tr.appendChild(pricingTd);

      const qtyTd = document.createElement("td");
      const input = document.createElement("input");
      input.type = "number";
      input.min = "0";
      input.value = "0";
      input.dataset.index = index.toString();
      qtyTd.appendChild(input);
      tr.appendChild(qtyTd);

      const subTotalTd = document.createElement("td");
      subTotalTd.textContent = "0";
      subTotalTd.className = "subtotal";
      tr.appendChild(subTotalTd);

      cartBody.appendChild(tr);
    });

    function calculate() {
      let total = 0;
      const rows = cartBody.querySelectorAll("tr");

      // 贈品計數
      let goodProGiftPacks = 0; // 好韌真 Pro 贈幾包
      let paseoWetGiftSets = 0; // PASEO 濕式贈幾組

      rows.forEach((row, i) => {
        const product = products[i];
        const input = row.querySelector("input[type='number']");
        const qty = parseInt(input.value || "0", 10);
        let subTotal = 0;

        // 一般商品：單價 x 數量
        if (!product.pairPrice) {
          subTotal = product.priceSingle * qty;
        } else {
          // 有 2 入折價的商品（A 方案）
          const pair = Math.floor(qty / 2);
          const remain = qty % 2;
          subTotal = pair * product.pairPrice + remain * product.priceSingle;
        }

        // 贈品邏輯
        if (product.key === "goodPro") {
          if (qty === 1) {
            goodProGiftPacks += 2;
          } else if (qty >= 2) {
            // 目前規則：買 2 件送 5 包，假設 2 件以上都送 5 包
            goodProGiftPacks += 5;
          }
        }

        if (product.key === "paseo3") {
          // 每 2 串送 1 組濕式，可累計
          const sets = Math.floor(qty / 2);
          paseoWetGiftSets += sets;
        }

        row.querySelector(".subtotal").textContent = subTotal.toString();
        total += subTotal;
      });

      // 滿額折扣（可累計）
      const times = Math.floor(total / DISCOUNT_THRESHOLD);
      const discount = times * DISCOUNT_AMOUNT;
      const finalTotal = total - discount;

      totalSpan.textContent = total.toString();
      discountSpan.textContent = discount.toString();
      finalTotalSpan.textContent = finalTotal.toString();

      // 組合贈品文字
      const giftTexts = [];
      if (goodProGiftPacks > 0) {
        giftTexts.push(
          `倍潔雅 好韌真 Pro 3層抽取式衛生紙：本次贈品共 ${goodProGiftPacks} 包（依買 1 送 2、買 2 送 5 規則計算）。`
        );
      }
      if (paseoWetGiftSets > 0) {
        giftTexts.push(
          `PASEO 3層柔韌舒適抽取式衛生紙：本次可得 PASEO 濕式 20 抽×4 包／組 共 ${paseoWetGiftSets} 組。`
        );
      }
      giftInfoDiv.textContent =
        giftTexts.length > 0 ? giftTexts.join(" ") : "目前未達贈品條件。";
    }

    // 監聽所有輸入框
    cartBody.addEventListener("input", function (e) {
      if (e.target && e.target.matches("input[type='number']")) {
        calculate();
      }
    });

    // 初始化
    calculate();
  </script>
</body>
</html>
